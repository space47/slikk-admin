name: Azure Static Web Apps CI/CD
on:
  push:
    branches:
      - develop     # development
      - staging     # staging
      - master      # production
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - develop
      - staging
      - master

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    environment: ${{ 
      github.ref == 'refs/heads/master' && 'production' || 
      github.ref == 'refs/heads/staging' && 'staging' || 
      'development' 
      }}                          # ✅ auto picks environment based on branch
    permissions:
       id-token: write
       contents: read
    steps:
      - uses: actions/checkout@v3
        with:
          submodules: true
          lfs: false

      - name: Cache node_modules
        id: cache-node-modules
        uses: actions/cache@v3
        with:
          path: |
            node_modules
            ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci

      - name: Debug env                 # ✅ remove this after confirming it works
        run: |
          echo "Branch: ${{ github.ref }}"
          echo "Environment: ${{ github.ref == 'refs/heads/master' && 'production' || github.ref == 'refs/heads/staging' && 'staging' || 'development' }}"
          echo "VITE_BACKEND_URI is set: ${{ secrets.VITE_BACKEND_URI != '' }}"

      - name: Build
        run: npm run build
        env:
          VITE_BACKEND_URI: ${{ secrets.VITE_BACKEND_URI }}

      - name: Cache OIDC packages
        id: cache-oidc
        uses: actions/cache@v3
        with:
          path: node_modules/@actions
          key: oidc-${{ runner.os }}-core-1.6.0

      - name: Install OIDC Client from Core Package
        if: steps.cache-oidc.outputs.cache-hit != 'true'
        run: npm install @actions/core@1.6.0 @actions/http-client

      - name: Get Id Token
        uses: actions/github-script@v6
        id: idtoken
        with:
           script: |
               const coredemo = require('@actions/core')
               return await coredemo.getIDToken()
           result-encoding: string

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_LIVELY_BAY_037B15000 }}
          action: "upload"
          app_location: "build"
          api_location: ""
          output_location: ""
          skip_app_build: true
          github_id_token: ${{ steps.idtoken.outputs.result }}

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        id: closepullrequest
        uses: Azure/static-web-apps-deploy@v1
        with:
          action: "close"
